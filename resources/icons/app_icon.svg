<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: rounded square with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#5856d6"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect x="128" y="128" width="896" height="896" rx="180" ry="180" fill="url(#bgGrad)"/>

  <!-- Chat bubble 1 (left/top) -->
  <path d="M280 320 Q280 260 340 260 L580 260 Q640 260 640 320 L640 480 Q640 540 580 540 L400 540 L340 600 L340 540 Q280 540 280 480 Z"
        fill="url(#bubbleGrad)" opacity="0.95"/>

  <!-- Chat bubble 2 (right/bottom) -->
  <path d="M384 560 Q384 500 444 500 L724 500 Q784 500 784 560 L784 720 Q784 780 724 780 L520 780 L460 840 L460 780 Q384 780 384 720 Z"
        fill="url(#bubbleGrad)" opacity="0.95"/>

  <!-- AI sparkle/star -->
  <g transform="translate(760, 240)">
    <polygon points="40,0 45,30 80,40 45,50 40,80 35,50 0,40 35,30" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Circuit pattern (AI symbol) -->
  <circle cx="400" cy="380" r="24" fill="none" stroke="#007aff" stroke-width="6"/>
  <circle cx="520" cy="380" r="24" fill="none" stroke="#007aff" stroke-width="6"/>
  <line x1="424" y1="380" x2="496" y2="380" stroke="#007aff" stroke-width="6"/>
  <line x1="400" y1="356" x2="400" y2="320" stroke="#007aff" stroke-width="6"/>
  <line x1="520" y1="404" x2="520" y2="460" stroke="#007aff" stroke-width="6"/>
  <circle cx="400" cy="320" r="8" fill="#007aff"/>
  <circle cx="520" cy="460" r="8" fill="#007aff"/>

  <!-- Circuit pattern on second bubble -->
  <circle cx="520" cy="620" r="24" fill="none" stroke="#007aff" stroke-width="6"/>
  <circle cx="640" cy="620" r="24" fill="none" stroke="#007aff" stroke-width="6"/>
  <line x1="544" y1="620" x2="616" y2="620" stroke="#007aff" stroke-width="6"/>
  <line x1="640" y1="596" x2="640" y2="560" stroke="#007aff" stroke-width="6"/>
  <circle cx="640" cy="560" r="8" fill="#007aff"/>
</svg>